name: Monthly Segment Backtests

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '30 6 1 * *'
  workflow_dispatch:

jobs:
  backtests:
    runs-on: ubuntu-latest
    env:
      SL_DATABASE_URL: ${{ secrets.SL_DATABASE_URL }}
    steps:
      - name: Preflight secrets
        id: preflight
        run: |
          if [ -z "${SL_DATABASE_URL}" ]; then
            echo "::warning::Missing SL_DATABASE_URL; skipping Monthly Segment Backtests."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.preflight.outputs.should_run == 'true'

      - name: Set up Python
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply database migrations
        if: steps.preflight.outputs.should_run == 'true'
        run: python scripts/run_db_migrations.py

      - name: Refresh holdout quarantine
        if: steps.preflight.outputs.should_run == 'true'
        run: python scripts/run_quarantine_holdout.py 2023-2025 --test-start 2023-01-01 --test-end 2025-12-31

      - name: Run all family backtests and evidence pipeline
        if: steps.preflight.outputs.should_run == 'true'
        run: python scripts/run_all_family_backtests.py
